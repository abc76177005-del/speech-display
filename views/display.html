<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 자막</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; }
#visible { display: flex; flex-direction: column; gap: 8px; }
.line { font-size: 32px; font-weight: 600; color: #fff; line-height: 1.5; }
.line.interim { color: #888; font-weight: 400; }
#more-btn { margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; font-size: 14px; padding: 6px 16px; border-radius: 20px; cursor: pointer; display: none; align-self: flex-start; }
#hidden-lines { display: none; flex-direction: column; gap: 8px; margin-bottom: 8px; }
#hidden-lines.open { display: flex; }
#status { position: fixed; top: 1rem; right: 1rem; font-size: 12px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="status">연결 중...</div>
<div id="hidden-lines"></div>
<button id="more-btn" onclick="toggleHidden()">더보기...</button>
<div id="visible"></div>
<script>
const visibleEl = document.getElementById('visible');
const hiddenEl = document.getElementById('hidden-lines');
const moreBtn = document.getElementById('more-btn');
const statusEl = document.getElementById('status');
let lines = [];
let isOpen = false;

const ws = new WebSocket('wss://' + location.host);
ws.onopen = () => statusEl.textContent = '연결됨';
ws.onerror = () => statusEl.textContent = '연결 실패';
ws.onclose = () => statusEl.textContent = '연결 끊김';

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if (data.final && data.final.trim() !== '') {
    lines.push(data.final.trim());
    if (lines.length > 60) lines.shift();
  }
  render(data.interim || '');
};

function render(interim) {
  const recent = lines.slice(-4);
  const older = lines.slice(0, -4);

  visibleEl.innerHTML = '';
  recent.forEach(text => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = text;
    visibleEl.appendChild(div);
  });

  if (interim.trim() !== '') {
    const div = document.createElement('div');
    div.className = 'line interim';
    div.textContent = interim;
    visibleEl.appendChild(div);
  }

  hiddenEl.innerHTML = '';
  older.forEach(text => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = text;
    hiddenEl.appendChild(div);
  });

  moreBtn.style.display = older.length > 0 ? 'flex' : 'none';
}

function toggleHidden() {
  isOpen = !isOpen;
  hiddenEl.className = isOpen ? 'open' : '';
  moreBtn.textContent = isOpen ? '접기' : '더보기...';
}
</script>
</body>
</html>
