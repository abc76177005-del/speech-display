<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 자막</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; }
#lines { display: flex; flex-direction: column; gap: 8px; }
.line { font-size: 32px; font-weight: 600; color: #fff; line-height: 1.5; }
.line.interim { color: #888; font-weight: 400; }
#status { position: fixed; top: 1rem; right: 1rem; font-size: 12px; color: #444; }
</style>
</head>
<body>
<div id="status">연결 중...</div>
<div id="lines"></div>
<script>
const linesEl = document.getElementById('lines');
const statusEl = document.getElementById('status');
let lines = [];

const ws = new WebSocket('wss://' + location.host);
ws.onopen = () => statusEl.textContent = '연결됨';
ws.onerror = () => statusEl.textContent = '연결 실패';
ws.onclose = () => statusEl.textContent = '연결 끊김';

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  
  if (data.final && data.final.trim() !== '') {
    lines.push(data.final.trim());
    if (lines.length > 4) lines.shift();
  }

  render(data.interim || '');
};

function render(interim) {
  linesEl.innerHTML = '';
  lines.forEach(text => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = text;
    linesEl.appendChild(div);
  });
  if (interim.trim() !== '') {
    const div = document.createElement('div');
    div.className = 'line interim';
    div.textContent = interim;
    linesEl.appendChild(div);
  }
}
</script>
</body>
</html>
