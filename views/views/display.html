<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 자막</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 2rem; }
#final { font-size: 32px; font-weight: 600; color: #fff; line-height: 1.5; white-space: pre-wrap; }
#interim { font-size: 32px; font-weight: 400; color: #888; line-height: 1.5; }
#status { position: fixed; top: 1rem; right: 1rem; font-size: 12px; color: #444; }
</style>
</head>
<body>
<div id="status">연결 중...</div>
<div id="final"></div>
<div id="interim"></div>
<script>
const finalEl = document.getElementById('final');
const interimEl = document.getElementById('interim');
const statusEl = document.getElementById('status');
let saved = '';

const ws = new WebSocket('wss://' + location.host);
ws.onopen = () => statusEl.textContent = '연결됨';
ws.onerror = () => statusEl.textContent = '연결 실패';
ws.onclose = () => statusEl.textContent = '연결 끊김';

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if (data.final) saved += data.final;
  finalEl.textContent = saved;
  interimEl.textContent = data.interim || '';
};
</script>
</body>
</html>
